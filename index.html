<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Like → Ping</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --text: #e8eaed;
      --muted: #8b909a;
      --accent: #ff4d6d;
      --ok: #4ade80;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      overflow: hidden;
    }
    /* 全屏发红的氛围光，随点击越来越浓 */
    #heat {
      position: fixed; inset: 0;
      background: radial-gradient(circle at 50% 45%, rgba(255,40,80,0.55), transparent 60%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s ease;
      z-index: 0;
    }
    #confetti {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .card {
      position: relative;
      z-index: 2;
      width: 340px;
      background: var(--card);
      border: 1px solid #23262f;
      border-radius: 18px;
      padding: 30px 28px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    .target {
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 16px;
    }
    /* 模式切换 */
    .modes {
      display: flex;
      gap: 4px;
      background: #11141a;
      border: 1px solid #23262f;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .modes button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 7px 4px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .2s, color .2s;
      line-height: 1.3;
    }
    .modes button.active { background: var(--accent); color: #fff; font-weight: 700; }
    .mode-hint {
      font-size: 11px;
      color: var(--muted);
      margin: -12px 0 16px;
      min-height: 14px;
    }
    .btn-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
    }
    .glow {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--accent);
      filter: blur(22px);
      opacity: 0;
      transform: scale(.6);
      transition: opacity .3s ease, transform .3s ease;
    }
    .like-btn {
      position: relative;
      z-index: 1;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #20141a;
      font-size: 56px;
      line-height: 120px;
      transition: transform .08s ease, background .2s ease;
      user-select: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .like-btn:hover { background: #2a1820; }
    .like-btn:active { transform: scale(.86); }
    .like-btn.pop { animation: pop .35s cubic-bezier(.3,1.6,.5,1); }
    @keyframes pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .count {
      margin-top: 16px;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1.5px;
      transition: color .3s ease, text-shadow .3s ease;
    }
    .count-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .cheer {
      margin-top: 14px;
      font-size: 15px;
      font-weight: 700;
      min-height: 20px;
      color: var(--accent);
      transition: opacity .2s ease;
    }
    .combo {
      font-size: 12px;
      color: #ffd166;
      min-height: 14px;
      margin-top: 2px;
      font-weight: 600;
    }

    /* 进度条：到下一个 100 还差多少 */
    .progress {
      margin: 16px auto 4px;
      width: 100%;
      height: 6px;
      background: #23262f;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4d6d, #ffb05c);
      border-radius: 99px;
      transition: width .25s ease;
    }
    .progress-label { font-size: 11px; color: var(--muted); }

    .status {
      margin-top: 14px;
      font-size: 12px;
      min-height: 16px;
      color: var(--muted);
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }

    /* 点击飘出的 +1 / 鼓励词 */
    .float {
      position: absolute;
      left: 50%;
      top: 30%;
      transform: translateX(-50%);
      font-weight: 800;
      pointer-events: none;
      z-index: 6;
      white-space: nowrap;
      animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translate(-50%, 0) scale(.6); }
      20%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -90px) scale(1.1); }
    }
  </style>
</head>
<body>
  <div id="heat"></div>
  <canvas id="confetti"></canvas>

  <div class="card">
    <div class="target">→ www.deeplumen.com/agent/</div>
    <div class="modes">
      <button id="modePing" class="active">🔥 刷请求量</button>
      <button id="modeVisit">👁 刷真实访问</button>
    </div>
    <div class="mode-hint" id="modeHint">狂点也没事，每点一次发一个请求（服务器日志可见）</div>
    <div class="btn-wrap">
      <div class="glow" id="glow"></div>
      <button id="likeBtn" class="like-btn" aria-label="like">🤍</button>
    </div>
    <div class="count" id="count">0</div>
    <div class="count-label">次点赞 · 已发送请求</div>

    <div class="cheer" id="cheer">点一下，开始吧 ✨</div>
    <div class="combo" id="combo"></div>

    <div class="progress"><i id="bar"></i></div>
    <div class="progress-label" id="progressLabel">距离下一个里程碑还差 100 下</div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const TARGET = "https://www.deeplumen.com/agent/";
    const btn = document.getElementById("likeBtn");
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const cheerEl = document.getElementById("cheer");
    const comboEl = document.getElementById("combo");
    const glowEl = document.getElementById("glow");
    const heatEl = document.getElementById("heat");
    const barEl = document.getElementById("bar");
    const progressLabel = document.getElementById("progressLabel");
    const wrap = document.querySelector(".btn-wrap");

    let count = 0;
    let comboCount = 0;
    let lastClick = 0;
    let mode = "ping"; // "ping" | "visit"

    // 模式切换
    const modePing = document.getElementById("modePing");
    const modeVisit = document.getElementById("modeVisit");
    const modeHint = document.getElementById("modeHint");
    modePing.addEventListener("click", () => setMode("ping"));
    modeVisit.addEventListener("click", () => setMode("visit"));
    function setMode(m) {
      mode = m;
      modePing.classList.toggle("active", m === "ping");
      modeVisit.classList.toggle("active", m === "visit");
      modeHint.textContent = m === "ping"
        ? "狂点也没事，每点一次发一个请求（服务器日志可见）"
        : "每点一次真实打开页面跑统计（GA 会 +1），别太快、可能要允许弹窗";
    }

    // 鼓励词，随机飘
    const CHEERS = [
      "好耶！", "继续！", "再来一个！", "手感不错 👍", "停不下来了～",
      "你超猛！", "节奏起来了！", "就是这样！", "再多一点！", "无敌了！",
      "点赞之王 👑", "热度拉满！", "燃起来了 🔥", "保持！", "上头了吧？"
    ];
    // 里程碑专属鼓励
    const MILESTONES = {
      10:  "连点 10 下，热身完成！",
      25:  "25 下！手速惊人 ⚡",
      50:  "半百达成，势不可挡！",
      100: "💯 一百下！传奇诞生！",
    };

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function spawnFloat(text, color) {
      const el = document.createElement("div");
      el.className = "float";
      el.textContent = text;
      el.style.color = color || "#fff";
      el.style.fontSize = (14 + Math.random() * 10) + "px";
      el.style.left = (40 + Math.random() * 20) + "%";
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    // 越点越红：氛围光 + 数字发光 + 按钮光晕，随 count 增强（封顶）
    function updateHeat() {
      const heat = Math.min(count / 100, 1); // 0~1，100 下达到最浓
      heatEl.style.opacity = (heat * 0.85).toFixed(2);
      glowEl.style.opacity = (0.25 + heat * 0.6).toFixed(2);
      glowEl.style.transform = `scale(${(0.7 + heat * 0.7).toFixed(2)})`;
      const lum = 100 - heat * 35; // 数字从白渐变到红
      countEl.style.color = `hsl(348, ${Math.round(heat * 100)}%, ${lum}%)`;
      countEl.style.textShadow = `0 0 ${Math.round(heat * 26)}px rgba(255,60,90,${heat})`;
    }

    function updateProgress() {
      const into = count % 100;
      const pct = into === 0 && count > 0 ? 100 : into;
      barEl.style.width = pct + "%";
      const remain = (100 - (count % 100)) % 100 || (count === 0 ? 100 : 100);
      const need = count % 100 === 0 ? 100 : 100 - (count % 100);
      progressLabel.textContent = `距离下一个里程碑还差 ${need} 下`;
    }

    function updateCombo() {
      const now = performance.now();
      if (now - lastClick < 600) comboCount++;
      else comboCount = 1;
      lastClick = now;
      if (comboCount >= 3) {
        comboEl.textContent = `🔥 连击 x${comboCount}`;
      } else {
        comboEl.textContent = "";
      }
    }

    // ===== 撒花 =====
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); addEventListener("resize", resize);

    const COLORS = ["#ff4d6d", "#ffd166", "#06d6a0", "#4cc9f0", "#b388ff", "#fff"];
    function burst(amount) {
      for (let i = 0; i < amount; i++) {
        particles.push({
          x: innerWidth / 2,
          y: innerHeight * 0.42,
          vx: (Math.random() - 0.5) * 14,
          vy: Math.random() * -12 - 4,
          g: 0.35 + Math.random() * 0.2,
          size: 5 + Math.random() * 7,
          color: pick(COLORS),
          rot: Math.random() * 6,
          vr: (Math.random() - 0.5) * 0.4,
          life: 1,
        });
      }
      if (!rafOn) loop();
    }
    let rafOn = false;
    function loop() {
      rafOn = true;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life -= 0.012;
        ctx.save();
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      });
      particles = particles.filter(p => p.life > 0 && p.y < canvas.height + 40);
      if (particles.length) requestAnimationFrame(loop);
      else { ctx.clearRect(0, 0, canvas.width, canvas.height); rafOn = false; }
    }

    // ===== 模式 A：发请求（no-cors，发出即可，可狂点）=====
    async function ping() {
      const url = `${TARGET}?_=${count}-${Math.floor(performance.now())}`;
      try {
        await fetch(url, { method: "GET", mode: "no-cors", cache: "no-store" });
        statusEl.textContent = "✓ 请求已发送 #" + count;
        statusEl.className = "status ok";
      } catch (e) {
        statusEl.textContent = "✗ 发送失败";
        statusEl.className = "status err";
      }
    }

    // ===== 模式 B：真实访问（新标签打开，跑 GA，3.5s 自动关）=====
    function visit() {
      const w = window.open(
        TARGET,
        "dl_visit",
        "width=480,height=640,noopener=no"
      );
      if (!w) {
        statusEl.textContent = "✗ 弹窗被拦，请允许本站弹窗后重试";
        statusEl.className = "status err";
        return;
      }
      statusEl.textContent = "✓ 已打开真实访问 #" + count + "（自动关闭）";
      statusEl.className = "status ok";
      setTimeout(() => { try { w.close(); } catch (e) {} }, 3500);
    }

    function fire() { mode === "visit" ? visit() : ping(); }

    function onClick() {
      count++;
      countEl.textContent = count;
      btn.textContent = "❤️";

      // 弹跳
      btn.classList.remove("pop");
      void btn.offsetWidth;
      btn.classList.add("pop");

      updateHeat();
      updateProgress();
      updateCombo();

      // 飘字
      spawnFloat("+1", "#ff8fa3");
      if (Math.random() < 0.4) spawnFloat(pick(CHEERS), "#ffd166");

      // 鼓励文案
      if (MILESTONES[count]) {
        cheerEl.textContent = MILESTONES[count];
      } else if (count % 25 === 0) {
        cheerEl.textContent = pick(CHEERS);
      } else if (comboCount >= 3) {
        cheerEl.textContent = pick(CHEERS);
      } else if (count <= 3) {
        cheerEl.textContent = "感觉来了！再来 →";
      }

      // 撒花：每 100 下大庆祝；50 中庆祝；10/25 小庆祝
      if (count % 100 === 0) {
        burst(180);
        cheerEl.textContent = "🎉 " + (count) + " 下！撒花！继续冲！";
      } else if (count % 50 === 0) {
        burst(90);
      } else if (count % 10 === 0) {
        burst(36);
      }

      fire();
    }

    btn.addEventListener("click", onClick);
    updateProgress();
  </script>
</body>
</html>
